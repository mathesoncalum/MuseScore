name: PR Labeler
on:
  pull_request:
    types: [opened]

jobs:
  label-community:
    runs-on: ubuntu-slim
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Check PR author
        run: |
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          if ! grep -qx "  - $PR_AUTHOR" .github/team_members.yml; then
            gh pr edit ${{ github.event.pull_request.number }} --add-label "community PR"
          fi
        env:
          GH_TOKEN: ${{ github.token }}